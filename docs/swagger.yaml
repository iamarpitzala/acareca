      page:
        type: integer
      total:
        type: integer
    type: object
info:
  contact:
    name: API Support
  description: Backend API for acareca
  title: Backend API
  version: 1.0.0
paths:
  /admin/audit:
    get:
      consumes:
      - application/json
      description: Query audit logs with filters
      parameters:
      - description: Filter by Practice ID
        in: query
        name: practice_id
        type: string
      - description: Filter by User ID
        in: query
        name: user_id
        type: string
      - description: Filter by Module name
        in: query
        name: module
        type: string
      - description: Filter by Action name
        in: query
        name: action
        type: string
      - description: Filter by Entity type
        in: query
        name: entity_type
        type: string
      - description: Filter by Entity ID
        in: query
        name: entity_id
        type: string
      - description: Start date (e.g. 2026-03-18T00:00:00Z)
        in: query
        name: start_date
        type: string
      - description: End date (e.g. 2026-03-18T23:59:59Z)
        in: query
        name: end_date
        type: string
      - description: Search across module and action
        in: query
        name: search
        type: string
      - description: Sort field (created_at, action)
        in: query
        name: sort_by
        type: string
      - description: Sort direction (ASC, DESC)
        in: query
        name: order_by
        type: string
      - default: 100
        description: Page size
        in: query
        name: limit
        type: integer
      - default: 0
        description: Page offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.RsList'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.RsError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.RsError'
      security:
      - BearerToken: []
      summary: List audit logs
      tags:
      - audit
  /admin/audit/{id}:
    get:
      consumes:
      - application/json
      description: Get a specific audit log entry
      parameters:
      - description: Audit Log ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/audit.RsAuditLog'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.RsError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.RsError'
      security:
      - BearerToken: []
      summary: Get audit log by ID
      tags:
      - audit
  /admin/create-fy:
    post:
      consumes:
      - application/json
      parameters:
      - description: Financial Year Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/fy.RqCreateFY'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/fy.RsFinancialYear'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.RsError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.RsError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.RsError'
      security:
      - BearerToken: []
      summary: Create a new financial year
      tags:
      - fy
  /admin/get-fys:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.RsList'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.RsError'
      security:
      - BearerToken: []
      summary: Get all financial years
      tags:
      - fy
  /admin/get-quarters/{financial_year_id}:
    get:
      parameters:
      - description: Financial Year UUID
        in: path
        name: financial_year_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.RsList'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.RsError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.RsError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.RsError'
      security:
      - BearerToken: []
      summary: Get all quarters for a specific financial year
      tags:
      - fy
  /admin/subscription:
    get:
      consumes:
      - application/json
      description: list subscriptions
      parameters:
      - description: Filter by subscription name
        in: query
        name: name
        type: string
      - description: Search in name and description
        in: query
        name: search
        type: string
      - description: 'Field to sort by (default: created_at)'
        in: query
        name: sort_by
        type: string
      - description: 'Sort order: ASC or DESC (default: DESC)'
        in: query
        name: order_by
        type: string
      - description: 'Number of items per page (default: 20)'
        in: query
        name: limit
        type: integer
      - description: Number of items to skip
        in: query
        name: offset
        type: integer
      produces:

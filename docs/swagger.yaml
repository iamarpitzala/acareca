info:
  contact:
    name: API Support
  description: Backend API for acareca
  title: Backend API
  version: 1.0.0
paths:
  /accountant/:
    get:
      consumes:
      - application/json
      description: Retrieves a list of all registered users for the accountant view.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/accountant.RsAccountantUser'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.RsError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.RsError'
      security:
      - BearerToken: []
      summary: Fetch all users
      tags:
      - accountant
  /accountant/analytics:
    get:
      consumes:
      - application/json
      description: Retrieves analytics for the accountant.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/accountant.RsAnalytics'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.RsError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.RsError'
      security:
      - BearerToken: []
      summary: Fetch analytics
      tags:
      - accountant
  /accountant/clinics:
    get:
      consumes:
      - application/json
      description: Retrieves all clinics belonging to practitioners who have a completed
        invitation with this accountant.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/accountant.ClinicDetail'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.RsError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.RsError'
      security:
      - BearerToken: []
      summary: Fetch assigned clinics
      tags:
      - accountant
  /accountant/forms:
    get:
      consumes:
      - application/json
      description: Retrieves all forms belonging to clinics that this accountant has
        access to via completed invitations.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/accountant.RsAccountantForm'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.RsError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.RsError'
      security:
      - BearerToken: []
      summary: Fetch assigned forms
      tags:
      - accountant
  /admin:
    post:
      consumes:
      - application/json
      description: Creates a new entry in tbl_user with Role=ADMIN and a corresponding
        entry in tbl_admin within a single transaction.
      parameters:
      - description: Admin and User details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/admin.RqCreateAdmin'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.RsBase'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.RsError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.RsError'
      summary: Create admin profile and user
      tags:
      - admin
  /admin/{id}:
    get:
      description: Get nested Admin and User information by Admin ID
      parameters:
      - description: Admin ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.RsBase'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.RsError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.RsError'
      security:
      - BearerToken: []
      summary: Get Admin Detail
      tags:
      - admin
  /admin/accountant:
    get:
      description: Fetch a paginated list of all accountants with their associated
        practitioners. Admin only.
      parameters:
      - description: Filter by exact email address
        in: query
        name: email
        type: string
      - description: Filter by accountant full name (partial match)
        in: query
        name: name
        type: string
      - description: Filter by phone number (partial match)
        in: query
        name: phone
        type: string
      - description: Search across accountant full name and email
        in: query
        name: search
        type: string
      - description: 'Number of records per page (default: 10, max: 100)'
        in: query
        name: limit
        type: integer
      - description: 'Number of records to skip (default: 0)'
        in: query
        name: offset
        type: integer
      - description: 'Sort field: id, first_name, last_name, email (default: id)'
        in: query
        name: sort_by
        type: string
      - description: 'Sort order: ASC or DESC (default: DESC)'
        in: query
        name: order_by
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/util.RsList'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.RsError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.RsError'
      security:
      - BearerToken: []
      summary: List all accountants with their practitioners (Admin)
      tags:
      - admin-accountant
  /admin/analytics/accountant/overview:
    get:
      description: Returns accountant KPIs and invite status distribution
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/analytics.RsAccountantOverview'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.RsError'
      security:
      - BearerToken: []
      summary: Get accountant dashboard overview
      tags:
      - admin-dashboard
  /admin/analytics/accountant/resource-access-timeseries:
    get:
      description: Returns accountant resource access over time by resource type
      parameters:
      - description: Start date (YYYY-MM-DD)
        in: query
        name: from
        type: string
      - description: End date (YYYY-MM-DD)
        in: query
        name: to
        type: string
      - description: 'Time bucket: day, week, month'
        in: query
        name: bucket
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/analytics.RsResourceAccessTimeseries'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.RsError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.RsError'
      security:
      - BearerToken: []
      summary: Get resource access timeseries
      tags:
      - admin-dashboard
  /admin/analytics/active-users:
    get:
      description: Returns DAU, WAU, MAU metrics with DAU/MAU ratio and timeline
      parameters:
      - description: Start date (YYYY-MM-DD)
        in: query
        name: start_date
        type: string
      - description: End date (YYYY-MM-DD)
        in: query
        name: end_date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/analytics.RsActiveUsers'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.RsError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.RsError'
      security:
      - BearerToken: []
      summary: Get daily/weekly/monthly active users
      tags:
      - admin-analytics
  /admin/analytics/billing/plan-distribution:
    get:
      description: Returns plan distribution with historical revenue and subscription
        counts
      parameters:
      - description: Start date (YYYY-MM-DD)
        in: query
        name: from
        type: string
      - description: End date (YYYY-MM-DD)
        in: query
        name: to
        type: string
      - description: 'Time bucket: day, week, month'
        in: query
        name: bucket
        type: string
      produces:
      - application/json
      responses:

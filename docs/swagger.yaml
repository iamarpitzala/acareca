        type: string
      city:
        type: string
      id:
        type: string
      is_primary:
        type: boolean
      postcode:
        type: string
      state:
        type: string
    type: object
  clinic.RsClinicContact:
    properties:
      contact_type:
        type: string
      id:
        type: string
      is_primary:
        type: boolean
      label:
        type: string
      value:

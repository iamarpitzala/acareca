basePath: /api/v1
definitions:
  auth.RsGoogleAuthURL:
    properties:
      url:
        type: string
    type: object
  auth.RsToken:
    properties:
      access_token:
        type: string
      is_superadmin:
        type: boolean
      refresh_token:
        type: string
    type: object
  auth.RsUser:
    properties:
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      is_superadmin:
        type: boolean
      last_name:
        type: string
      phone:
        type: string
      updated_at:
        type: string
    type: object
  calculation.Entry:
    properties:
      clinic_share:
        minimum: 0
        type: number
      expense:
        items:
          $ref: '#/definitions/calculation.Input'
        type: array
      income:
        items:
          $ref: '#/definitions/calculation.Input'
        type: array
      other_costs:
        items:
          $ref: '#/definitions/calculation.Input'
        type: array
      out_work_percentage:
        maximum: 100
        minimum: 0
        type: number
      owner_share:
        minimum: 0
        type: number
      super_component:
        type: number
    type: object
  calculation.GrossResult:
    properties:
      gst_service_fee:
        type: number
      net_amount:
        type: number
      remitted_amount:
        type: number
      service_fee:
        type: number
      total_service_fee:
        type: number
    type: object
  calculation.Input:
    properties:
      name:
        maxLength: 255
        type: string
      paid_by:
        allOf:
        - $ref: '#/definitions/calculation.PaidBy'
        enum:
        - clinic
        - owner
      tax:
        allOf:
        - $ref: '#/definitions/method.TaxTreatment'
        enum:
        - inclusive
        - exclusive
        - manual
        - zero
      tax_value:
        type: number
      value:
        minimum: 0
        type: number
    type: object
  calculation.NetAmountResult:
    properties:
      expense:
        items:
          type: number
        type: array
      income:
        items:
          type: number
        type: array
      result:
        type: number
    type: object
  calculation.NetResult:
    properties:
      commission:
        type: number
      gst_commission:
        type: number
      net_amount:
        type: number
      super_component:
        type: number
      super_component_commission:
        type: number
      total_commission:
        type: number
      total_remuneration:
        type: number
    type: object
  calculation.OutWorkResult:
    properties:
      gst_service_fee:
        type: number
      net_amount:
        type: number
      net_payable:
        type: number
      service_fee:
        type: number
      total_service_fee:
        type: number
    type: object
  calculation.PaidBy:
    enum:
    - clinic
    - owner
    type: string
    x-enum-varnames:
    - PaidByClinic
    - PaidByOwner
  clinic.RqBulkDeleteClinic:
    properties:
      clinic_ids:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - clinic_ids
    type: object
  clinic.RqBulkUpdateClinic:
    properties:
      clinics:
        items:

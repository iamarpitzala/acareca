      addresses:
        items:
          $ref: '#/definitions/clinic.RsClinicAddress'
        type: array
      contacts:
        items:
          $ref: '#/definitions/clinic.RsClinicContact'
        type: array
      created_at:
        type: string
      description:
        type: string
      financial_settings:

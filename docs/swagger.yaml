basePath: /api/v1
definitions:
  auth.RsGoogleAuthURL:
    properties:
      url:
        type: string
    type: object
  auth.RsToken:
    properties:
      access_token:
        type: string
      is_superadmin:
        type: boolean
      refresh_token:
        type: string
    type: object
  auth.RsUser:
    properties:
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      is_superadmin:
        type: boolean
      last_name:
        type: string
      phone:
        type: string
      updated_at:
        type: string
    type: object
  clinic.RqClinicAddress:
    properties:
      address:
        type: string
      city:
        type: string
      is_primary:
        type: boolean
      postcode:
        type: string
      state:
        type: string
    type: object
  clinic.RqClinicContact:
    properties:
      contact_type:
        enum:
        - PHONE
        - EMAIL
        - WEBSITE
        - FAX
        type: string
      is_primary:
        type: boolean
      label:
        type: string
      value:
        type: string
    required:
    - contact_type
    - value
    type: object
  clinic.RqCreateClinic:
    properties:
      abn:
        type: string
      addresses:
        items:
          $ref: '#/definitions/clinic.RqClinicAddress'
        type: array
      contacts:
        items:
          $ref: '#/definitions/clinic.RqClinicContact'
        type: array
      description:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      profile_picture:
        type: string
    required:
    - name
    type: object
  clinic.RqUpdateAddress:
    properties:
      address:
        type: string
      city:
        type: string
      id:
        type: string
      is_primary:
        type: boolean
      postcode:
        type: string
      state:
        type: string
    type: object
  clinic.RqUpdateClinic:
    properties:
      abn:
        type: string
      addresses:
        items:
          $ref: '#/definitions/clinic.RqUpdateAddress'
        type: array
      contacts:
        items:
          $ref: '#/definitions/clinic.RqUpdateContact'
        type: array
      description:
        type: string
      financial_year_id:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      lock_date:
        type: string
      name:
        type: string
      profile_picture:
        type: string
    type: object
  clinic.RqUpdateContact:
    properties:
      contact_type:
        enum:
        - PHONE
        - EMAIL
        - WEBSITE
        - FAX
        type: string
      id:
        type: string
      is_primary:
        type: boolean
      label:
        type: string
      value:
        type: string
    type: object
  clinic.RsClinic:
    properties:
      abn:
        type: string
      addresses:
        items:
          $ref: '#/definitions/clinic.RsClinicAddress'
        type: array
      contacts:
        items:
          $ref: '#/definitions/clinic.RsClinicContact'
        type: array
      created_at:
        type: string
      description:
        type: string
      financial_settings:
        $ref: '#/definitions/clinic.RsFinancialSettings'
      id:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      practitioner_id:
        type: string
      profile_picture:
        type: string
      updated_at:
        type: string
    type: object
  clinic.RsClinicAddress:
    properties:
      address:
        type: string
      city:
        type: string
      id:
        type: string
      is_primary:
        type: boolean
      postcode:
        type: string
      state:
        type: string
    type: object
  clinic.RsClinicContact:
    properties:
      contact_type:
        type: string
      id:
        type: string
      is_primary:
        type: boolean
      label:
        type: string
      value:
        type: string
    type: object
  clinic.RsFinancialSettings:
    properties:
      financial_year_id:
        type: string
      id:
        type: string
      lock_date:
        type: string
    type: object
  coa.AccountTax:
    properties:
      createdAt:
        type: string
      id:
        type: integer
      isTaxable:
        type: boolean
      name:
        type: string
      rate:
        type: number
      updatedAt:
        type: string
    type: object
  coa.AccountType:
    properties:
      createdAt:
        type: string
      id:
        type: integer
      name:
        type: string
      updatedAt:
        type: string
    type: object
  coa.RqCreateChartOfAccountOfAccount:
    properties:
      account_tax_id:
        minimum: 1
        type: integer
      account_type_id:
        minimum: 1
        type: integer
      code:
        maximum: 9999
        minimum: 100
        type: integer
      is_system:
        type: boolean
      name:
        maxLength: 255
        type: string
    required:
    - account_tax_id
    - account_type_id
    - code
    - name
    type: object
  coa.RqUpdateCharOfAccountOfAccount:
    properties:
      account_tax_id:
        minimum: 1
        type: integer
      account_type_id:
        minimum: 1
        type: integer
      code:
        maximum: 9999
        minimum: 100
        type: integer
      name:
        maxLength: 255
        type: string
    type: object
  coa.RsChartOfAccount:
    properties:
      account_tax_id:
        type: integer
      account_type_id:
        type: integer
      code:
        type: integer
      created_at:
        type: string
      id:
        type: string
      is_system:
        type: boolean
      name:
        type: string
      practitioner_id:
        type: string
      updated_at:
        type: string
    type: object
  detail.RsFormDetail:
    properties:
      clinic_id:
        type: string
      clinic_share:
        type: integer
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      method:
        type: string
      name:
        type: string
      owner_share:
        type: integer
      status:
        type: string
      updated_at:
        type: string
    type: object
  entry.RqEntryValue:
    properties:
      amount:
        minimum: 0
        type: number
      form_field_id:
        type: string
      gst_amount:
        type: number
    required:
    - amount
    - form_field_id
    type: object
  entry.RqFormEntry:
    properties:
      clinic_id:
        type: string
      status:
        enum:
        - DRAFT
        - SUBMITTED
        type: string
      values:
        items:
          $ref: '#/definitions/entry.RqEntryValue'
        type: array
    required:
    - clinic_id
    type: object
  entry.RqUpdateFormEntry:
    properties:
      status:
        enum:
        - DRAFT
        - SUBMITTED
        type: string
      values:
        items:
          $ref: '#/definitions/entry.RqEntryValue'
        type: array
    type: object
  entry.RsEntryValue:
    properties:
      form_field_id:
        type: string
      gross_amount:
        type: number
      gst_amount:
        type: number
      net_amount:
        type: number
    type: object
  entry.RsFormEntry:
    properties:
      clinic_id:
        type: string
      created_at:
        type: string
      form_version_id:
        type: string
      id:
        type: string
      status:
        type: string
      submitted_at:
        type: string
      submitted_by:
        type: string
      updated_at:
        type: string
      values:
        items:
          $ref: '#/definitions/entry.RsEntryValue'
        type: array
    type: object
  field.RqFormField:
    properties:
      coa_id:
        type: string
      label:
        maxLength: 255
        type: string
      payment_responsibility:
        enum:
        - OWNER
        - CLINIC
        type: string
      section_type:
        enum:
        - COLLECTION
        - COST
        - OTHER_COST
        type: string
      tax_type:
        enum:
        - INCLUSIVE
        - EXCLUSIVE
        - MANUAL
        type: string
    required:
    - coa_id
    - label
    - section_type
    type: object
  field.RqUpdateFormField:
    properties:
      coa_id:
        type: string
      id:
        type: string
      label:
        maxLength: 255
        type: string
      payment_responsibility:
        enum:
        - OWNER
        - CLINIC
        type: string
      section_type:
        enum:
        - COLLECTION
        - COST
        - OTHER_COST
        type: string
      tax_type:
        enum:
        - INCLUSIVE
        - EXCLUSIVE
        - MANUAL
        type: string
    required:
    - id
    type: object
  field.RsFormField:
    properties:
      coa_id:
        type: string
      created_at:
        type: string
      form_version_id:
        type: string
      id:
        type: string
      label:
        type: string
      payment_responsibility:
        type: string
      section_type:
        type: string
      tax_type:
        type: string
      updated_at:
        type: string
    type: object
  form.RqCreateFormWithFields:
    properties:
      clinic_id:
        type: string
      clinic_share:
        maximum: 100
        minimum: 0
        type: integer
      description:
        type: string
      fields:
        items:
          $ref: '#/definitions/field.RqFormField'
        type: array
      method:
        enum:
        - INDEPENDENT_CONTRACTOR
        - SERVICE_FEE
        type: string
      name:
        type: string
      owner_share:
        maximum: 100
        minimum: 0
        type: integer
      status:
        enum:
        - DRAFT
        - PUBLISHED
        - ARCHIVED
        type: string
    required:
    - clinic_id
    - clinic_share
    - method
    - name
    - owner_share
    type: object
  form.RqUpdateFormWithFields:
    properties:
      clinic_id:
        type: string
      clinic_share:
        maximum: 100
        minimum: 0
        type: integer
      description:
        type: string
      fields:
        items:
          $ref: '#/definitions/field.RqUpdateFormField'
        type: array
      id:
        type: string
      method:
        enum:
        - INDEPENDENT_CONTRACTOR
        - SERVICE_FEE
        type: string
      name:
        type: string
      owner_share:
        maximum: 100
        minimum: 0
        type: integer
      status:
        enum:
        - DRAFT
        - PUBLISHED
        - ARCHIVED
        type: string
    required:
    - clinic_id
    type: object
  form.RsFormWithFields:
    properties:
      active_version_id:
        type: string
      fields:
        items:
          $ref: '#/definitions/field.RsFormField'
        type: array
      form:
        $ref: '#/definitions/detail.RsFormDetail'
    type: object
  fy.RqCreateFY:
    properties:
      fy_year:
        type: string
      is_active:
        type: boolean
      label:
        type: string
    required:
    - fy_year
    - label
    type: object
  fy.RqUpdateFYLabel:
    properties:
      is_active:
        type: boolean
      label:
        type: string
    type: object
  fy.RsFinancialQuarter:
    properties:
      end_date:
        type: string
      id:
        type: string
      label:
        type: string
      start_date:
        type: string
    type: object
  fy.RsFinancialYear:
    properties:
      end_date:
        type: string
      id:
        type: string
      label:
        type: string
      start_date:
        type: string
    type: object
  response.RsError:
    properties:
      code:
        type: integer
      detail:
        type: string
      message:
        type: string
    type: object
  setting.RqCreatePractitioner:
    properties:
      abn:
        maxLength: 20
        type: string
      user_id:
        type: string
      verified:
        type: boolean
    required:
    - user_id
    type: object
  setting.RsPractitioner:
    properties:
      abn:
        type: string
      created_at:
        type: string
      id:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
      verified:
        type: boolean
    type: object
  setting.RsPractitionerSetting:
    properties:
      color:
        type: string
      created_at:
        type: string
      id:
        type: integer
      logo:
        type: string
      practitioner_id:
        type: string
      timezone:
        type: string
      updated_at:
        type: string
    type: object
  subscription.RsSubscription:
    properties:
      created_at:
        type: string
      description:
        type: string
      duration_days:
        type: integer
      id:
        type: integer
      is_active:
        type: boolean
      name:
        type: string
      price:
        type: number
      updated_at:
        type: string
    type: object
  util.RsList:
    properties:
      items: {}
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
info:
  contact:
    name: API Support
  description: Backend API for acareca
  title: Backend API
  version: 1.0.0
paths:
  /admin/subscription:
    get:
      consumes:
      - application/json
      description: list subscriptions
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/subscription.RsSubscription'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.RsError'
      security:
      - BearerToken: []
      summary: List subscriptions
      tags:
      - subscription
    post:
      consumes:
      - application/json
      description: create a new subscription
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/subscription.RsSubscription'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.RsError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.RsError'
      security:
      - BearerToken: []
      summary: Create a new subscription
      tags:
      - subscription
  /admin/subscription/{id}:
    delete:
      consumes:
      - application/json
      description: delete a subscription
      parameters:
      - description: Subscription ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.RsError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.RsError'
      security:
      - BearerToken: []
      summary: Delete a subscription
      tags:
      - subscription
    get:
      consumes:
      - application/json
      description: get a subscription
      parameters:
      - description: Subscription ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/subscription.RsSubscription'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.RsError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.RsError'
      security:
      - BearerToken: []
      summary: Get a subscription
      tags:
      - subscription
    put:
      consumes:
      - application/json
      description: update a subscription
      parameters:
      - description: Subscription ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/subscription.RsSubscription'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.RsError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.RsError'
      security:
      - BearerToken: []
      summary: Update a subscription
      tags:
      - subscription
  /auth/google:
    get:
      description: get Google OAuth consent-screen URL
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.RsGoogleAuthURL'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.RsError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.RsError'
      summary: Get Google OAuth consent-screen URL
      tags:
      - auth
  /auth/google/callback:
    get:
      description: handle Google OAuth callback
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.RsToken'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.RsError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.RsError'
      summary: Handle Google OAuth callback
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: login a user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.RsToken'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.RsError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.RsError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.RsError'
      summary: Login a user
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: register a new user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.RsUser'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.RsError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.RsError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.RsError'
      summary: Register a new user
      tags:
      - auth
  /clinic:
    get:
      parameters:
      - description: Filter by clinic name
        in: query
        name: name
        type: string
      - description: Filter by clinic ID
        in: query
        name: id
        type: string
      - description: Filter by active status
        in: query
        name: is_active
        type: boolean
      - description: Search across name, abn, description
        in: query
        name: search
        type: string
      - description: Sort field (name, is_active, created_at)
        in: query
        name: sort_by
        type: string
      - description: Sort direction (ASC, DESC)
        in: query
        name: order_by
        type: string
      - description: Page size (default 10, max 100)
        in: query
        name: limit
        type: integer
      - description: Page offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/clinic.RsClinic'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.RsError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.RsError'
      summary: Get all clinics for practitioner
      tags:
      - clinic
    post:
      consumes:
      - application/json
      parameters:
      - description: Clinic Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/clinic.RqCreateClinic'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/clinic.RsClinic'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.RsError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.RsError'
      summary: Create a new clinic
      tags:
      - clinic
  /clinic/{id}:
    delete:
      parameters:
      - description: Clinic UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.RsError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.RsError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.RsError'
      security:
      - BearerToken: []
      summary: Delete a clinic
      tags:
      - clinic
    get:
      parameters:
      - description: Clinic UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/clinic.RsClinic'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.RsError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.RsError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.RsError'
      security:
      - BearerToken: []
      summary: Get clinic by ID
      tags:
      - clinic
    put:
      consumes:
      - application/json
      parameters:
      - description: Clinic UUID
        in: path
        name: id
        required: true
        type: string
      - description: Updated Clinic Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/clinic.RqUpdateClinic'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/clinic.RsClinic'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.RsError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.RsError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.RsError'
      security:
      - BearerToken: []
      summary: Update clinic details
      tags:
      - clinic
  /coa/account-taxes:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/coa.AccountTax'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.RsError'
      security:
      - BearerToken: []
      summary: List all account tax types
      tags:
      - coa
  /coa/account-taxes/{id}:
    get:
      parameters:
      - description: Account Tax ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/coa.AccountTax'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.RsError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.RsError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.RsError'
      security:
      - BearerToken: []
      summary: Get account tax by ID
      tags:
      - coa
  /coa/account-types:
    get:

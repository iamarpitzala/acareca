        type: array
    required:
    - clinics
    type: object
  clinic.RqClinicAddress:
    properties:
      address:
        type: string
      city:
        type: string
      is_primary:
        type: boolean
      postcode:
        type: string
      state:
        type: string
    type: object
  clinic.RqClinicContact:
    properties:
      contact_type:
        enum:
        - PHONE
        - EMAIL
        - WEBSITE
        - FAX
        type: string
      is_primary:
        type: boolean
      label:
        type: string
      value:
        type: string
